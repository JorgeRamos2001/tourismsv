spring:
  application:
    name: TourismSV
  config:
    import: optional:file:.env[.properties]

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tourismsv}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy}
            scope: profile, email

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET}
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

  notifications:
    email-delay-minutes: ${NOTIFICATION_EMAIL_DELAY_MINUTES:5}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:8080/api/v1/auth/oauth2/callback}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  level:
    root: INFO
    com.tourismsv: DEBUG
    org.hibernate.SQL: DEBUG

---
# ──────────────── Perfil: dev ────────────────
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    com.tourismsv: DEBUG
    org.springframework.security: DEBUG

---
# ──────────────── Perfil: test ────────────────
spring:
  config:
    activate:
      on-profile: test

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    clean-disabled: false

logging:
  level:
    com.tourismsv: INFO
    org.hibernate.SQL: WARN

---
# ──────────────── Perfil: prod ────────────────
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    show-sql: false

  flyway:
    clean-disabled: true

logging:
  level:
    root: WARN
    com.tourismsv: INFO
    org.hibernate.SQL: WARN